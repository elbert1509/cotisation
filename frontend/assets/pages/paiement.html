<body>
    
    <header class = "hero">
        <div class = "header-title">
            <span class ="emoji ">    </span>
            <h1> Cotisation Famille unie </h1>
            <span> </span>
        </div>

        <nav class = "navbar">
            <div class="logo"> <span class="logo-icon"> <img class="image_logo" src="../images/famille.png" alt=""></span> <span class="logo-text"> </span> </div>
            <button id="menu-toggle" aria-label="Ouvrir le menu"> &#9776; </button>

            </ul>

        <section class="upload-section">
            <h2>Justification de cotisation</h2>
            <form id="upload-form">
                <label for="cotisant-select" class="nom-cotisant">Nom du Cotisant</label>
                <select name="cotisant" id="cotisant-select">
                    <option value="">Sélectionner un nom</option>
                </select>

                <label for="file-upload" class="file-label">Sélectionner un fichier</label>
                <input type="file" id="file-upload" class="file-input" accept=".pdf, .jpg, .png, .jpeg">
                
                <label for="montant">Montant </label>
                <input type="number" id="montant" name="montant" placeholder="Entrez le montant" required>
                
                <button type="submit" class="upload-btn">Soumettre</button>
            </form>

            <script src="../js/main.js"></script>
            <script type="module" src="../js/paiement.js"></script>
            <!-- Firebase App (nécessaire pour utiliser Firebase) -->
            <script type="text/javascript"
            src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
            </script>
            <script type="text/javascript">
            (function(){
                emailjs.init({
                    publicKey: "Ev_TfCFHSzpy-3YmO",
                });
            })();
            </script>
